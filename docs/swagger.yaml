  dto.CheckoutResponse:
    properties:
      link_url:
        type: string
      order_code:
        type: string
    type: object
  dto.DecodeResponse:
    properties:
      result: {}
    type: object
  dto.EventRequest:
    properties:
      chapter:
        example: ""
        type: string
      limit:
        example: "10"
        type: string
      offset:
        example: "0"
        type: string
      status:
        example: ""
        type: string
    required:
    - limit
    - offset
    type: object
  dto.EventResponse:
    properties:
      image_url:
        type: string
      result: {}
    type: object
  dto.FilterRequest:
    properties:
      filter:
        example: kaos
        type: string
      limit:
        example: "10"
        type: string
    required:
    - filter
    - limit
    type: object
  dto.ForgotRequest:
    properties:
      otp:
        example: 1234
        type: integer
      password:
        example: "123456"
        type: string
      username:
        example: admin
        type: string
    type: object
  dto.LoginRequest:
    properties:
      password:
        example: "123456"
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  dto.LoginResponse:
    properties:
      token:
        type: string
      type:
        type: string
    type: object
  dto.LogoutResponse:
    properties:
      message:
        type: string
    type: object
  dto.NotifRequest:
    properties:
      limit:
        type: string
      offset:
        type: string
    required:
    - limit
    - offset
    type: object
  dto.OauthRequest:
    properties:
      id_token:
        example: ""
        type: string
    required:
    - id_token
    type: object
  dto.OrderRequest:
    properties:
      confirm:
        example: "0"
        type: string
      end:
        example: "2026-05-30"
        type: string
      limit:
        example: "10"
        type: string
      offset:
        example: "0"
        type: string
      paid:
        example: "0"
        type: string
      start:
        example: "2026-04-01"
        type: string
    type: object
  dto.OrderResponse:
    properties:
      imageurl:
        type: string
      items: {}
      result: {}
    type: object
  dto.ProductResponse:
    properties:
      image_url:
        type: string
      result: {}
    type: object
  dto.ReqOtpRequest:
    properties:
      username:
        example: "0812345"
        type: string
    type: object
  dto.ShippingForm:
    properties:
      address:
        type: string
      city:
        type: string
      city_name:
        type: string
      district:
        type: string
      district_name:
        type: string
      province:
        type: string
      province_name:
        type: string
    required:
    - address
    - city
    - city_name
    - district
    - district_name
    - province
    - province_name
    type: object
  dto.SliderResponse:
    properties:
      image_url:
        type: string
      result: {}
      splash:
        type: string
    type: object
  dto.UpdateUserRequest:
    properties:
      address:
        example: Jalan Tomat No.123 AB
        type: string
      cartype:
        example: W124 E320
        type: string
      city:
        example: Medan
        type: string
      name:
        example: Budi
        type: string
      vehicleno:
        example: B 354 RR
        type: string
      zip:
        example: "20121"
        type: string
    required:
    - address
    - cartype
    - city
    - name
    - vehicleno
    - zip
    type: object
  dto.UploadResponse:
    properties:
      ext:
        type: string
      message:
        type: string
      path:
        type: string
      type:
        type: string
    type: object
  dto.VerifyRequest:
    properties:
      otp:
        example: 1234
        type: integer
      username:
        example: "0812345678"
        type: string
    type: object
  dto.VoucherResponse:
    properties:
      image_url:
        type: string
      result: {}
    type: object
  dto.VoucherValidateResponse:
    properties:
      discount:
        type: number
    type: object
  dto.WalletResponse:
    properties:
      result: {}
      total:
        type: number
    type: object
  dto.WishlistRequest:
    properties:
      limit:
        example: "10"
        type: string
      offset:
        example: "0"
        type: string
    required:
    - limit
    - offset
    type: object
  go-rest_internal_auth_dto.ErrorResponse:
    properties:
      error:
        example: invalid request
        type: string
    type: object
  go-rest_internal_cart_dto.ErrorResponse:
    properties:
      error:
        example: invalid request
        type: string
    type: object
  go-rest_internal_cart_dto.SuccessResponse:
    properties:
      message:
        type: string
    type: object
  go-rest_internal_chapter_dto.ErrorResponse:
    properties:
      error:
        example: invalid request
        type: string
    type: object
  go-rest_internal_chapter_dto.InterfaceResponse:
    properties:
      result: {}
    type: object
  go-rest_internal_chapter_dto.SuccessResponse:
    properties:
      message:
        type: string
    type: object
  go-rest_internal_event_dto.ErrorResponse:
    properties:
      error:
        example: invalid request
        type: string
    type: object
  go-rest_internal_event_dto.SuccessResponse:
    properties:
      message:
        type: string
    type: object
  go-rest_internal_order_dto.ErrorResponse:
    properties:
      error:
        example: invalid request
        type: string
    type: object
  go-rest_internal_order_dto.InterfaceResponse:
    properties:
      result: {}
    type: object
  go-rest_internal_product_dto.BoolResponse:
    properties:
      status:
        type: boolean
    type: object
  go-rest_internal_product_dto.ErrorResponse:
    properties:
      error:
        example: invalid request
        type: string
    type: object
  go-rest_internal_product_dto.IndexRequest:
    properties:
      category:
        example: ""
        type: string
      condition:
        example: new
        type: string
      limit:
        example: "10"
        type: string
      location:
        example: ""
        type: string
      offset:
        example: "0"
        type: string
      order:
        example: desc
        type: string
      orderby:
        example: id
        type: string
    type: object
  go-rest_internal_product_dto.InterfaceResponse:
    properties:
