    type: object
  dto.CartNotesRequest:
    properties:
      notes:
        type: string
    type: object
  dto.CartRequest:
    properties:
      product_id:
        example: 94
        type: integer
      qty:
        example: 1
        type: integer
    required:
    - product_id
    - qty
    type: object
  dto.CartResponse:
    properties:
      image_url:
        type: string
      result: {}
