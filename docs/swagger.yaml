info:
  contact: {}
paths:
  /article:
    post:
      consumes:
      - application/json
      description: Retrieve paginated list of articles filtered by category
      parameters:
      - description: Filter and pagination data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ArticleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: List of articles retrieved successfully
          schema:
            $ref: '#/definitions/dto.ArticleResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/go-rest_internal_chapter_dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-rest_internal_chapter_dto.ErrorResponse'
      summary: Get list of articles
      tags:
      - Article
  /article/{permalink}:
    get:
      consumes:
      - application/json
      description: Retrieve article detail by permalink
      parameters:
      - description: Article permalink
        in: path
        name: permalink
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Article detail retrieved successfully
          schema:
            $ref: '#/definitions/dto.ArticleResponse'
        "400":
          description: Article not found
          schema:
            $ref: '#/definitions/go-rest_internal_chapter_dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-rest_internal_chapter_dto.ErrorResponse'
      summary: Get article by permalink
      tags:
      - Article
  /article_category:
    get:
      consumes:
      - application/json
      description: Retrieve all available news categories
      produces:
      - application/json
      responses:
        "200":
          description: List of news categories retrieved successfully
          schema:
            $ref: '#/definitions/go-rest_internal_chapter_dto.InterfaceResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/go-rest_internal_chapter_dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-rest_internal_chapter_dto.ErrorResponse'
      summary: Get list of news categories
      tags:
      - Article
  /cart:
    get:
      consumes:
      - application/json
      description: Retrieve all cart items with product details and total amount for
        authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: Cart retrieved successfully
          schema:
            $ref: '#/definitions/dto.CartResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user cart
      tags:
      - Cart
    post:
      consumes:
      - application/json
      description: Add a product to cart with automatic shipping cost calculation
      parameters:
      - description: Product ID and quantity
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CartRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Product added to cart successfully
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.SuccessResponse'
        "400":
          description: Validation error or shipping cost calculation failed
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add product to cart
      tags:
      - Cart
  /cart/{id}:
    delete:
      consumes:
      - application/json
      description: Remove a specific item from cart by ID
      parameters:
      - description: Cart ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Cart item deleted successfully
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.SuccessResponse'
        "400":
          description: Invalid ID
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete cart item
      tags:
      - Cart
  /cart/clean:
    delete:
      consumes:
      - application/json
      description: Remove all items from authenticated user's cart
      produces:
      - application/json
      responses:
        "200":
          description: Cart cleaned successfully
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.SuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Clean user cart
      tags:
      - Cart
  /cart/notes/{id}:
    put:
      consumes:
      - application/json
      description: Add or update notes for a specific cart item, empty string will
        set notes to null
      parameters:
      - description: Cart ID
        in: path
        name: id
        required: true
        type: integer
      - description: Notes data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CartNotesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Notes updated successfully
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.SuccessResponse'
        "400":
          description: Invalid ID or validation error
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Set cart item notes
      tags:
      - Cart
  /cart/pickup/{id}:
    put:
      consumes:
      - application/json
      description: Toggle pickup option for a specific cart item, if pickup is on
        then shipping cost will be removed
      parameters:
      - description: Cart ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Pickup toggled successfully
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.SuccessResponse'
        "400":
          description: Invalid ID
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Toggle cart item pickup
      tags:
      - Cart
  /cart/publish/{id}:
    put:
      consumes:
      - application/json
      description: Toggle publish option for a specific cart item, if publish is on
        then will process when checkout
      parameters:
      - description: Cart ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Publish toggled successfully
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.SuccessResponse'
        "400":
          description: Invalid ID
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-rest_internal_cart_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Toggle cart item publish
      tags:
      - Cart
  /chapter:
    post:
      consumes:
      - application/json
      description: get all chapters
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ChapterResponse'
      summary: Get chapters
      tags:
      - Chapter
  /chapter/{id}:
    get:
      consumes:
      - application/json
      description: get chapter by id
      parameters:
      - description: Chapter ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ChapterDetailResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get chapter by ID
      tags:
      - Chapter
  /chapter_front:
    post:
      consumes:
      - application/json
      description: get chapters with pagination
      parameters:
      - description: Pagination data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ChapterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ChapterResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get front chapters
      tags:
      - Chapter
  /checkout:
    get:
      consumes:
      - application/json
      description: Process checkout and generate payment URL
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CheckoutResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-rest_internal_order_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-rest_internal_order_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-rest_internal_order_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Checkout order
      tags:
      - Order
  /city:
    get:
      consumes:
      - application/json
      description: Retrieve list of all available cities
      produces:
      - application/json
      responses:
        "200":
          description: List of cities retrieved successfully
          schema:
            $ref: '#/definitions/go-rest_internal_chapter_dto.InterfaceResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-rest_internal_chapter_dto.ErrorResponse'
      summary: Get all cities
      tags:
      - General
  /city_shipping/{province_id}:
    get:
      consumes:
      - application/json
      description: Retrieve list of cities based on province ID for shipping purpose
      parameters:
      - description: Province ID
        in: path
        name: province_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of cities retrieved successfully
          schema:
            $ref: '#/definitions/go-rest_internal_chapter_dto.InterfaceResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/go-rest_internal_chapter_dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-rest_internal_chapter_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get cities by province for shipping
      tags:
      - Shipping
  /decode:
    get:
      consumes:
      - application/json
      description: Decode JWT token and retrieve user session from Redis
      produces:
      - application/json
      responses:
        "200":
          description: Success response with session data
          schema:
            $ref: '#/definitions/dto.DecodeResponse'
        "401":
          description: Unauthorized (invalid token / session expired)
          schema:
            $ref: '#/definitions/go-rest_internal_auth_dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-rest_internal_auth_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Decode user session
      tags:
      - Auth
  /district_shipping/{city_id}:
    get:
      consumes:
      - application/json
      description: Retrieve list of districts based on city ID for shipping purpose
      parameters:
      - description: City ID
        in: path
        name: city_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of districts retrieved successfully
          schema:
            $ref: '#/definitions/go-rest_internal_chapter_dto.InterfaceResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/go-rest_internal_chapter_dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-rest_internal_chapter_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get districts by province for shipping
      tags:
      - Shipping
  /event:
    post:
      consumes:
      - application/json
      description: Retrieve paginated list of events with chapter information
      parameters:
      - description: Filter and pagination data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.EventRequest'
      produces:
      - application/json
      responses:
        "200":
          description: List of events retrieved successfully
          schema:
            $ref: '#/definitions/dto.EventResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/go-rest_internal_event_dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-rest_internal_event_dto.ErrorResponse'
      summary: Get list of events
      tags:
      - Event
  /event/merchant:
    post:
      consumes:
      - multipart/form-data
      description: Register a merchant to participate in a specific event
      parameters:
      - description: Event ID
        in: formData
        name: eventid
        required: true
        type: string
      - description: Merchant Name
        in: formData
        name: name
        required: true
        type: string
      - description: Contact Person
        in: formData
        name: cp
        required: true
        type: string
      - description: Address
        in: formData
        name: address
        required: true
