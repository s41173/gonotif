    - new_password
    - username
    type: object
  dto.ChapterDetailResponse:
    properties:
      result:
        $ref: '#/definitions/model.Chapter'
    type: object
  dto.ChapterRequest:
    properties:
      limit:
        example: "10"
        type: string
      offset:
        example: "0"
        type: string
    type: object
  dto.ChapterResponse:
    properties:
      result:
