  go-rest_internal_user_dto.SuccessResponse:
    properties:
      message:
        type: string
    type: object
  go-rest_internal_voucher_dto.ErrorResponse:
    properties:
      error:
        example: invalid request
        type: string
    type: object
  go-rest_internal_voucher_dto.SuccessResponse:
    properties:
