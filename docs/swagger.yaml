definitions:
  dto.ArticleRequest:
    properties:
      category:
        example: ""
        type: string
      limit:
        example: "10"
        type: string
      offset:
        example: "0"
        type: string
    type: object
  dto.ArticleResponse:
    properties:
      image_url:
        type: string
